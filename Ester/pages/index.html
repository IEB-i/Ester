<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="../assets/favico_Branco.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema IEBI</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../CSS/index.css">
  <style>
    /* Estilos específicos do Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      gap: 20px;
      transition: var(--transition);
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
      border-color: var(--primary);
    }
    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(39, 174, 96, 0.1);
      color: var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
    }
    .stat-info h3 {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .stat-info p {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1;
    }
    .welcome-banner {
      background: linear-gradient(135deg, var(--header-bg), var(--primary));
      color: white;
      padding: 32px;
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
    }
    .welcome-text h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome-text p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    .welcome-image i {
      font-size: 7rem;
      opacity: 0.2;
    }
  </style>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0F4C3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <!-- Topbar Header -->
  <iebi-topbar></iebi-topbar>

  <div class="app-container">
    <!-- Sidebar Menu -->
    <iebi-sidebar active-menu="dashboard"></iebi-sidebar>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content-header">
        <div class="breadcrumb">
          Membresia / Dashboard
        </div>
      </div>

      <div class="welcome-banner">
        <div class="welcome-text">
          <h1>Bem-vindo ao Sistema IEBI!</h1>
          <p>Aqui você tem uma visão geral de todos os ministérios e atividades.</p>
        </div>
        <div class="welcome-image">
          <i class="ph ph-church"></i>
        </div>
      </div>

      <div class="page-title-container">
        <h2 class="page-title">Visão Geral</h2>
      </div>

      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <i class="ph ph-users"></i>
          </div>
          <div class="stat-info">
            <h3>Membros Ativos</h3>
            <p>1.245</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="ph ph-calendar-check"></i>
          </div>
          <div class="stat-info">
            <h3>Eventos do Mês</h3>
            <p>12</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="ph ph-graduation-cap"></i>
          </div>
          <div class="stat-info">
            <h3>Alunos no Ensino</h3>
            <p>320</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <i class="ph ph-users-three"></i>
          </div>
          <div class="stat-info">
            <h3>Células Ativas</h3>
            <p>45</p>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../JS/components.js"></script>
  <script src="../JS/script.js"></script>
</body>
</html>
