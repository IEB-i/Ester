<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="../assets/favico_Branco.png">
  <meta charset="UTF-8">
  <title>Importar Membros - Sistema IEBI</title>
  <link rel="icon" type="image/png" href="../assets/favico.png">
  <link rel="stylesheet" href="../CSS/index.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body style="padding: 40px; max-width: 800px; margin: 0 auto;">
  <div class="card" style="padding: 40px;">
      <h2 class="page-title" style="margin-bottom: 8px;">Migração de Banco de Dados</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Importe a planilha de membros gerada do sistema legado. Os dados serão formatados, limpos e salvos na nova estrutura da coleção <strong>pessoas</strong>.</p>
      
      <div style="padding: 24px; border: 2px dashed var(--border-color); border-radius: 8px; text-align: center; margin-bottom: 24px;">
          <input type="file" id="csvFile" accept=".csv" style="display: none;" />
          <button id="btnSelect" class="btn btn-secondary" onclick="document.getElementById('csvFile').click()" style="margin-bottom: 12px;">
              <i class="ph ph-file-csv"></i> Escolher Arquivo CSV
          </button>
          <p id="fileName" style="font-size: 0.9rem; color: var(--text-muted);">Nenhum arquivo selecionado.</p>
      </div>

      <button id="btnImportar" class="btn btn-primary" style="width: 100%; justify-content: center;" disabled>
          <i class="ph ph-upload-simple"></i> Iniciar Importação de Dados
      </button>
      
      <div style="margin-top: 32px;">
        <h4 style="margin-bottom: 12px;">Progresso: <span id="lblProgresso" style="color: var(--primary);">0 / 0</span></h4>
        <div id="logArea" style="height: 300px; overflow-y: auto; background: #0A0A0A; color: #33FF33; padding: 16px; font-family: monospace; font-size: 0.85rem; border-radius: 8px; border: 1px solid #333;">
            Aguardando início...<br>
        </div>
      </div>
  </div>

  <script type="module" src="../JS/importar.js"></script>
  <script>
      document.getElementById('csvFile').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if(file) {
              document.getElementById('fileName').textContent = file.name;
              document.getElementById('btnImportar').disabled = false;
          }
      });
  </script>
</body>
</html>
