<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="icon" type="image/png" href="../assets/favico_Branco.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pessoa Nova - Sistema IEBI</title>
  <link rel="icon" type="image/png" href="../assets/favico.png">
  <link rel="stylesheet" href="../CSS/index.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <meta name="description" content="Página de cadastro de novas pessoas do Sistema de Gestão IEBI.">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0F4C3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

  <!-- Topbar Header -->
  <iebi-topbar></iebi-topbar>

  <div class="app-container">
    <!-- Sidebar Menu -->
    <iebi-sidebar active-menu="pessoa-nova"></iebi-sidebar>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content-header">
        <div class="breadcrumb">
          Pessoas - Novo Cadastro
        </div>
      </div>

      <div class="page-title-container">
        <h2 class="page-title">Novo Cadastro</h2>
      </div>

      <div class="card form-card">
        <form id="formNovoCadastro">

          <!-- Seção A: Dados Pessoais -->
          <section class="form-section">
            <h3 class="section-title">Dados Pessoais</h3>

            <div class="form-grid">
              <div class="form-group full-width">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: João da Silva" required>
              </div>

              <div class="form-group">
                <label for="sexo" class="form-label">Sexo</label>
                <select id="sexo" name="sexo" class="form-control" required>
                  <option value="" disabled selected>Selecione...</option>
                  <option value="Masculino">Masculino</option>
                  <option value="Feminino">Feminino</option>
                  <option value="Não Informado">Não Informado</option>
                </select>
              </div>

              <div class="form-group">
                <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento" class="form-control">
              </div>

              <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="exemplo@email.com">
              </div>

              <div class="form-group">
                <label for="celular" class="form-label">Celular</label>
                <input type="tel" id="celular" name="celular" class="form-control" placeholder="(00) 00000-0000">
              </div>

              <div class="form-group">
                <label for="matricula_rol" class="form-label">Matrícula do Rol</label>
                <input type="text" id="matricula_rol" name="matricula_rol" class="form-control"
                  placeholder="Número de matrícula">
              </div>

              <div class="form-group">
                <label for="data_entrada" class="form-label">Data de Entrada</label>
                <input type="date" id="data_entrada" name="data_entrada" class="form-control">
              </div>

              <div class="form-group">
                <label for="arrolamento" class="form-label">Tipo de Arrolamento</label>
                <select id="arrolamento" name="arrolamento" class="form-control" required>
                  <option value="" disabled selected>Selecione...</option>
                  <option value="Membro">Membro</option>
                  <option value="Visitante">Visitante</option>
                  <option value="Batismo">Batismo</option>
                  <option value="Aclamação">Aclamação</option>
                  <option value="Transferência">Transferência</option>
                </select>
              </div>

              <div class="form-group">
                <label for="observacoes_arrolamento" class="form-label">Observações sobre o Arrolamento</label>
                <textarea id="observacoes_arrolamento" name="observacoes_arrolamento" class="form-control" rows="3"
                  placeholder="Insira observações relevantes aqui..."></textarea>
              </div>
            </div>
          </section>

          <!-- Seção B: Dados Complementares -->
          <section class="form-section">
            <h3 class="section-title">Dados Complementares</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="cpf" class="form-label">CPF</label>
                <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00">
              </div>

              <div class="form-group">
                <label for="rg" class="form-label">RG</label>
                <input type="text" id="rg" name="rg" class="form-control" placeholder="Número do RG">
              </div>

              <div class="form-group">
                <label for="apelido" class="form-label">Apelido</label>
                <input type="text" id="apelido" name="apelido" class="form-control"
                  placeholder="Como gosta de ser chamado">
              </div>

              <div class="form-group">
                <label for="naturalidade" class="form-label">Naturalidade</label>
                <input type="text" id="naturalidade" name="naturalidade" class="form-control" placeholder="Cidade - UF">
              </div>

              <div class="form-group">
                <label for="estado_civil" class="form-label">Estado Civil</label>
                <select id="estado_civil" name="estado_civil" class="form-control">
                  <option value="" disabled selected>Selecione...</option>
                  <option value="Solteiro(a)">Solteiro(a)</option>
                  <option value="Casado(a)">Casado(a)</option>
                  <option value="Divorciado(a)">Divorciado(a)</option>
                  <option value="Viúvo(a)">Viúvo(a)</option>
                </select>
              </div>

              <div class="form-group">
                <label for="escolaridade" class="form-label">Escolaridade</label>
                <select id="escolaridade" name="escolaridade" class="form-control">
                  <option value="" disabled selected>Selecione...</option>
                  <option value="Ensino Fundamental">Ensino Fundamental</option>
                  <option value="Ensino Médio">Ensino Médio</option>
                  <option value="Ensino Superior">Ensino Superior</option>
                  <option value="Pós-graduação">Pós-graduação</option>
                  <option value="Mestrado">Mestrado</option>
                  <option value="Doutorado">Doutorado</option>

                </select>
              </div>

              <div class="form-group">
                <label for="tipo_sanguineo" class="form-label">Tipo Sanguíneo</label>
                <select id="tipo_sanguineo" name="tipo_sanguineo" class="form-control">
                  <option value="" disabled selected>Selecione...</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Doador de Órgãos?</label>
                <div>
                  <label class="switch">
                    <input type="checkbox" id="doador_orgaos" name="doador_orgaos">
                    <span class="slider"></span>
                  </label>
                </div>
              </div>
            </div>
          </section>

          <!-- Seção C: Endereço -->
          <section class="form-section">
            <h3 class="section-title">Endereço</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="cep" class="form-label">CEP</label>
                <input type="text" id="cep" name="cep" class="form-control" placeholder="00000-000" maxlength="9">
              </div>

              <div class="form-group">
                <label for="logradouro" class="form-label">Logradouro (Rua, Avenida, etc.)</label>
                <input type="text" id="logradouro" name="logradouro" class="form-control" readonly>
              </div>

              <div class="form-group">
                <label for="bairro" class="form-label">Bairro</label>
                <input type="text" id="bairro" name="bairro" class="form-control" readonly>
              </div>

              <div class="form-group">
                <label for="cidade" class="form-label">Cidade</label>
                <input type="text" id="cidade" name="cidade" class="form-control" readonly>
              </div>

              <div class="form-group">
                <label for="uf" class="form-label">UF</label>
                <input type="text" id="uf" name="uf" class="form-control" readonly>
              </div>

              <div class="form-group">
                <label for="numero" class="form-label">Número</label>
                <input type="text" id="numero" name="numero" class="form-control" placeholder="Ex: 123">
              </div>

              <div class="form-group">
                <label for="complemento" class="form-label">Complemento</label>
                <input type="text" id="complemento" name="complemento" class="form-control"
                  placeholder="Apto, Bloco, etc.">
              </div>
            </div>
          </section>

          <!-- Seção D: Redes Sociais -->
          <section class="form-section">
            <h3 class="section-title">Redes Sociais & Contatos</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="site" class="form-label">Site</label>
                <input type="url" id="site" name="site" class="form-control" placeholder="www.site.com">
              </div>

              <div class="form-group">
                <label for="instagram" class="form-label">Instagram</label>
                <input type="text" id="instagram" name="instagram" class="form-control" placeholder="@usuario">
              </div>

              <div class="form-group">
                <label for="facebook" class="form-label">Facebook</label>
                <input type="text" id="facebook" name="facebook" class="form-control" placeholder="Perfil Facebook">
              </div>

              <div class="form-group">
                <label for="nome_recado" class="form-label">Nome p/ Recado</label>
                <input type="text" id="nome_recado" name="nome_recado" class="form-control"
                  placeholder="Com quem deixar recado?">
              </div>

              <div class="form-group">
                <label for="telefone_recado" class="form-label">Telefone para Recado</label>
                <input type="tel" id="telefone_recado" name="telefone_recado" class="form-control"
                  placeholder="(00) 00000-0000">
              </div>
            </div>
          </section>

          <!-- Ações -->
          <div class="form-actions">
            <button type="button" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar Cadastro</button>
          </div>

        </form>
      </div>
      <!-- Modal de Sucesso -->
      <div class="modal-overlay" id="sucessoModal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
          <div style="font-size: 4rem; color: var(--primary); margin-bottom: 16px;">
            <i class="ph ph-check-circle"></i>
          </div>
          <h3 style="margin-bottom: 8px; color: var(--text-main); font-size: 1.5rem;">Sucesso!</h3>
          <p style="color: var(--text-muted); margin-bottom: 24px;">Cadastro realizado com sucesso no sistema.</p>
          <button type="button" class="btn btn-primary" id="btnOkSucesso" style="width: 100%;">OK, Entendi</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../JS/components.js"></script>
  <script src="../JS/script.js"></script>
  <script type="module" src="../JS/firebase.js"></script>
  <script type="module" src="../JS/pessoa-nova.js"></script>
</body>

</html>
